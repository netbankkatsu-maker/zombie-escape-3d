<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ゾンビ3D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#05050f">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>ゾンビ脱出3D</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Three.js canvas -->
  <div id="game-canvas"></div>

  <!-- Overlays -->
  <div id="damage-flash"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-bars">
      <div class="bar-row">
        <span class="bar-lbl"><img src="icons/ui/heart-plus.svg" width="14" height="14" class="gi"></span>
        <div class="bar-wrap"><div id="hp-fill" class="bar-fill"></div></div>
        <span id="hp-num" class="bar-num">100</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl"><img src="icons/ui/heavy-lightning.svg" width="14" height="14" class="gi"></span>
        <div class="bar-wrap"><div id="st-fill" class="bar-fill" style="background:#00bbff"></div></div>
        <span id="st-num" class="bar-num">100</span>
      </div>
    </div>
    <div id="hud-items">
      <span id="weapon-info"><img src="icons/ui/crossed-swords.svg" width="14" height="14" class="gi"> 素手</span>
      <span id="gun-info" class="dim"><img src="icons/ui/revolver.svg" width="14" height="14" class="gi"> なし</span>
      <span id="heal-count" class="dim"><img src="icons/ui/first-aid-kit.svg" width="14" height="14" class="gi"> ×0</span>
      <span id="parts-row" style="display:none;color:#ff9900"><img src="icons/ui/gears.svg" width="14" height="14" class="gi"> ×<span id="parts-num">0</span></span>
    </div>
    <div id="exit-hint"><img src="icons/ui/exit-door.svg" width="13" height="13" class="gi"> 出口を目指せ！</div>
    <div id="hud-stats"><img src="icons/ui/alarm-clock.svg" width="12" height="12" class="gi"> <span id="timer-num">0:00</span> &nbsp; <img src="icons/ui/dread-skull.svg" width="12" height="12" class="gi"> <span id="kill-num">0</span></div>
    <!-- PC hint -->
    <div id="kb-hint">[Space]ATK &nbsp; [F]FIRE &nbsp; [R]HEAL &nbsp; [E]OPEN &nbsp; [B]BAG &nbsp; [Shift]走る</div>
  </div>

  <!-- Pickup toast (bottom-left) -->
  <div id="pickup-notif"></div>

  <!-- Nearby items panel -->
  <div id="nearby-panel"></div>

  <!-- Interact prompt -->
  <div id="interact-prompt"><img src="icons/ui/strongbox.svg" width="14" height="14" class="gi"> <b>OPEN</b> をタップ / <kbd>E</kbd></div>

  <!-- Weapon swap modal (kept for safety, unused) -->
  <div id="swap-prompt" style="display:none">
    <p id="swap-text"></p>
    <div class="swap-row">
      <button id="btn-swap-yes">交換する</button>
      <button id="btn-swap-no">そのまま</button>
    </div>
  </div>

  <!-- Upgrade modal -->
  <div id="upgrade-modal">
    <div id="upgrade-panel">
      <div id="upgrade-header">
        <span><img src="icons/ui/house.svg" width="14" height="14" class="gi"> セーフハウス — アップグレード</span>
        <span id="upgrade-parts-info"><img src="icons/ui/gears.svg" width="14" height="14" class="gi"> 資材: <b id="upgrade-parts">0</b></span>
      </div>
      <div id="upgrade-list"></div>
      <button id="btn-upgrade-close">閉じる</button>
    </div>
  </div>

  <!-- Inventory Overlay -->
  <div id="inv-overlay">
    <div id="inv-panel">
      <div id="inv-header">
        <span>🎒 インベントリ</span>
        <button id="btn-inv-close">✕</button>
      </div>

      <!-- Equipment slots -->
      <div id="inv-equip">
        <div class="equip-slot" id="equip-melee">
          <div class="eq-label">近接</div>
          <div class="eq-val">⚔ 素手</div>
        </div>
        <div class="equip-slot" id="equip-gun">
          <div class="eq-label">銃</div>
          <div class="eq-val" style="color:#555">なし</div>
        </div>
      </div>
      <div id="inv-unequip-row">
        <button id="inv-unequip-melee" style="display:none" class="inv-unequip-btn">近接をしまう</button>
        <button id="inv-unequip-gun"   style="display:none" class="inv-unequip-btn">銃をしまう</button>
      </div>

      <!-- Grid -->
      <div id="inv-grid-wrap">
        <div id="inv-grid">
          <!-- cells + items injected by JS -->
        </div>
      </div>

      <!-- Context menu -->
      <div id="inv-ctx" style="display:none">
        <button id="inv-ctx-equip"  style="display:none">🗡 装備する</button>
        <button id="inv-ctx-use"   style="display:none">✅ 使う</button>
        <button id="inv-ctx-rotate" style="display:none">🔄 回転</button>
        <button id="inv-ctx-drop">🗑 捨てる</button>
        <button id="inv-ctx-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- Action buttons (bottom right) -->
  <div id="action-buttons">
    <button id="btn-interact" class="abtn interact-abtn" style="display:none"><img src="icons/ui/strongbox.svg" width="22" height="22" class="gi"><br><small>OPEN</small></button>
    <button id="btn-inv"   class="abtn inv-abtn"><img src="icons/ui/backpack.svg" width="22" height="22" class="gi"><br><small>BAG</small></button>
    <button id="btn-heal"  class="abtn"><img src="icons/ui/first-aid-kit.svg" width="22" height="22" class="gi"><br><small>HEAL</small></button>
    <button id="btn-fire"  class="abtn"><img src="icons/ui/revolver.svg" width="22" height="22" class="gi"><br><small>FIRE</small></button>
    <button id="btn-attack" class="abtn atk-abtn"><img src="icons/ui/crossed-swords.svg" width="22" height="22" class="gi"><br><small>ATK</small></button>
  </div>

  <!-- Start / Win / GameOver overlay -->
  <div id="overlay">
    <h1 id="overlay-title"><img src="icons/ui/shambling-zombie.svg" width="26" height="26" class="gi"> ZOMBIE ESCAPE</h1>
    <div id="overlay-body"></div>
    <button id="overlay-btn">GAME START</button>
  </div>

  <!-- Virtual joystick -->
  <div id="joystick"><div id="joy-knob"></div></div>

  <!-- Force reload button — always accessible, works even if game.js fails -->
  <button id="btn-force-reload" onclick="forceReload()" title="強制リロード・キャッシュ消去">↺</button>

  <script>
  function forceReload(){
    var btn=document.getElementById('btn-force-reload');
    if(btn){btn.textContent='…';btn.disabled=true;}
    var p1=('serviceWorker' in navigator)
      ?navigator.serviceWorker.getRegistrations().then(function(regs){return Promise.all(regs.map(function(r){return r.unregister();}));})
      :Promise.resolve();
    var p2=('caches' in window)
      ?caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));})
      :Promise.resolve();
    Promise.all([p1,p2]).then(function(){location.reload(true);});
  }
  // ゲームのグローバルタッチハンドラに邪魔されないよう伝搬を止める
  (function(){
    var btn=document.getElementById('btn-force-reload');
    ['touchstart','touchend','touchmove','pointerdown','pointerup'].forEach(function(ev){
      btn.addEventListener(ev,function(e){e.stopPropagation();},{passive:false});
    });
    btn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();forceReload();},{passive:false});
  })();
  </script>

  <!-- Socket.io for multiplayer -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="./game.js"></script>
</body>
</html>
